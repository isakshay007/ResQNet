# ========================
# Base / Shared Config
# ========================
spring.application.name=backend
spring.profiles.default=local

# ========================
# Server Config
# ========================
server.port=${SERVER_PORT:8080}

# ========================
# PostgreSQL Config
# ========================
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ========================
# JPA / Hibernate Config
# ========================
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${SPRING_JPA_FORMAT_SQL:false}

# ========================
# Kafka Config
# ========================
resqnet.kafka.enabled=${RESQNET_KAFKA_ENABLED:false}
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:}
spring.kafka.consumer.group-id=${SPRING_KAFKA_CONSUMER_GROUP_ID:resqnet-group}
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.admin.auto-create=${SPRING_KAFKA_ADMIN_AUTO_CREATE:false}
spring.kafka.admin.fail-fast=${SPRING_KAFKA_ADMIN_FAIL_FAST:false}
resqnet.kafka.topic=${RESQNET_KAFKA_TOPIC:disaster-reports}

# ========================
# Security
# ========================
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:36000000}

# ========================
# Admin Seeding
# ========================
admin.default.password=${ADMIN_DEFAULT_PASSWORD}
app.seed.default-admin=${APP_SEED_DEFAULT_ADMIN:false}

# ========================
# Redis / Cache
# ========================
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.cache.type=${SPRING_CACHE_TYPE:none}

# ========================
# CORS Config
# ========================
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

# ========================
# OpenAPI / Swagger Config
# ========================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
