# ========================
# App Info
# ========================
spring.application.name=backend

# ========================
# PostgreSQL Config
# ========================
spring.datasource.url=jdbc:postgresql://localhost:5432/resqnetdb
spring.datasource.username=resqnetuser
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# ========================
# JPA / Hibernate Config
# ========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ========================
# Server Config
# ========================
server.port=8080

# ========================
# Kafka Config
# ========================
resqnet.kafka.enabled=${RESQNET_KAFKA_ENABLED:true}
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=resqnet-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

# Auto-create Kafka topics
spring.kafka.admin.auto-create=true
spring.kafka.admin.fail-fast=true

# Our custom topic
resqnet.kafka.topic=disaster-reports

# ========================
# JWT Security
# ========================
jwt.secret=${JWT_SECRET:resqnet_super_long_secret_key_for_jwt_which_is_at_least_32_chars_long_12345}
jwt.expiration=36000000   

# ========================
# Admin Config
# ========================
admin.default.password=${ADMIN_DEFAULT_PASSWORD:admin123}

# ========================
# Redis Config
# ========================
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}

# ========================
# CORS Config
# ========================
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

# ========================
# OpenAPI / Swagger Config
# ========================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
