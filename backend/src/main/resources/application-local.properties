# ========================
# Local Development Profile
# ========================

# DB
spring.datasource.url=jdbc:postgresql://localhost:5432/resqnetdb
spring.datasource.username=resqnetuser
spring.datasource.password=password

# JPA
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Kafka
resqnet.kafka.enabled=true
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.admin.auto-create=true
spring.kafka.admin.fail-fast=true

# Redis cache
spring.cache.type=redis
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Security / seeding (dev only)
jwt.secret=resqnet_local_dev_secret_key_for_jwt_which_is_at_least_32_chars_long
admin.default.password=admin123
app.seed.default-admin=true

# CORS
cors.allowed.origins=http://localhost:5173,http://localhost:3000
